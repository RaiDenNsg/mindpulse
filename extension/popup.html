<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindPulse Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-group">
        <div class="title-row">
          <div class="logo-mark" aria-hidden="true">MP</div>
          <div class="title">MindPulse</div>
        </div>
        <div class="subtitle">Focus Tracker</div>
      </div>
      <div class="header-user hidden" id="headerUserMeta">
        <span id="headerUserName"></span>
        <span class="header-separator" aria-hidden="true">·</span>
        <button type="button" id="headerSignOut" class="header-signout">Sign out</button>
      </div>
    </div>

    <div class="mode-group" aria-label="Focus mode selector">
      <button type="button" class="mode-btn" data-focus-mode="1" aria-pressed="false">
        Chill
      </button>
      <button type="button" class="mode-btn active" data-focus-mode="2" aria-pressed="true">
        Study
      </button>
      <button type="button" class="mode-btn" data-focus-mode="3" aria-pressed="false">
        Extreme
      </button>
    </div>

    <div class="status-section">
      <div class="status-indicator online"></div>
      <span class="status-text">Connected</span>
    </div>

    <div class="section-divider" aria-hidden="true"></div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Keystrokes</div>
        <div class="metric-value" id="keystrokeCount">0</div>
        <div class="metric-unit">keys</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Typing Speed</div>
        <div class="metric-value" id="typingSpeed">0</div>
        <div class="metric-unit">WPM</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Focus Score</div>
        <div class="metric-value" id="focusScore">0</div>
        <div class="metric-unit">%</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Cognitive Load</div>
        <div class="metric-value" id="cognitiveLoad">0</div>
        <div class="metric-unit">%</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Session Time</div>
        <div class="metric-value" id="sessionTime">0:00</div>
        <div class="metric-unit">min</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Backspaces</div>
        <div class="metric-value" id="backspaceCount">0</div>
        <div class="metric-unit">count</div>
      </div>
    </div>

    <div class="action-buttons">
      <button id="resetBtn" class="btn btn-secondary">Reset Session</button>
      <button id="syncBtn" class="btn btn-primary">Sync to Firebase</button>
    </div>

    <div class="footer">
      <div class="timestamp" id="timestamp">Not tracking</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
